services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 8000
      PGHOST: db
      PGPORT: 5432
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
      PGSSLMODE: disable
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      TAG_WRITE_MIN_INTERVAL_MS: ${TAG_WRITE_MIN_INTERVAL_MS:-15000}
      TAG_MOVE_MIN_METERS: ${TAG_MOVE_MIN_METERS:-30}
      TAG_SAME_LOCATION_WRITE_INTERVAL_MS: ${TAG_SAME_LOCATION_WRITE_INTERVAL_MS:-300000}
      TAGS_CACHE_TTL_MS: ${TAGS_CACHE_TTL_MS:-5000}
      TAGS_LIST_LIMIT: ${TAGS_LIST_LIMIT:-300}
      TAG_RETENTION_DAYS: ${TAG_RETENTION_DAYS:-30}
      TAG_CLEANUP_INTERVAL_MS: ${TAG_CLEANUP_INTERVAL_MS:-3600000}

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        EXPO_PUBLIC_BACKEND_BASE_URL: ${EXPO_PUBLIC_BACKEND_BASE_URL}
        EXPO_PUBLIC_GOOGLE_MAPS_API_KEY: ${EXPO_PUBLIC_GOOGLE_MAPS_API_KEY:-}
    restart: unless-stopped
    init: true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-80}:80"

volumes:
  postgres_data:
